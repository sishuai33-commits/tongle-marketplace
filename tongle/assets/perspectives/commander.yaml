# 方法论视角资产 — 朋友填写模板
# 这是 commander-perspective skill 读取的方法论资产（你的认知种子）。
#
# ⚠️ 如你不使用 commander-perspective skill，本文件可忽略或删除整个 assets/perspectives/。
#
# 怎么填：把你"实际就是这么想"的原则结构化填进来——不是"应该这样想"的规范，
# 是你真实决策时遵循的心智模型/启发式/红线。可借助 nuwa skill 从你的笔记/对话蒸馏。
#
# 派生关系：你的方法论主源 → 本 yaml（结构化资产）
#   → commander-perspective/SKILL.md（审查流程）→ distilled/commander.md（agent 认知种子）

meta:
  version: 0.1.0
  last_synced_from: ''
  source_of_truth: ''    # ← 填你方法论主源路径（如 memory/xxx.md 或 wiki/xxx.md；不用则留空）
  source_type: ''

# ═══ 怎么说话（表达DNA）═══
# 你的表达习惯。示例为通用写作原则，替换成你的
expression_dna:
  - 结论先行 — 先给判断再给推导
  # - 添加你的表达习惯...

# ═══ 怎么想（心智模型）═══
# 你思考问题时本能调用的框架。每个一个键，含 summary + source
mental_models:
  示例_第一性原理:
    summary: 从底层约束出发推导，不从惯例出发
    source: 你的来源
  # 示例_反馈闭环:
  #   summary: 任何设计先问反馈在哪，怎么知道做对了
  #   source: 你的来源

# ═══ 怎么判断（决策启发式，审查时逐项对照）═══
heuristics:
  - { id: 1, rule: "示例：不确定就不给精确数字 — 宁可模糊正确，不精确错误" }
  # - { id: 2, rule: "..." }

# ═══ 什么不做（纪律红灯，发现即标记）═══
red_flags:
  - { id: 1, rule: "示例：追求单点完美 — 在单组件过度打磨而非系统层做冗余" }
  # - { id: 2, rule: "..." }

# ═══ 知道局限（诚实边界）═══
limitations:
  - { id: 1, rule: "示例：模糊正确 > 精确错误 — 求方向准确，不求点位精确" }
  # - { id: 2, rule: "..." }

# ═══ 内在张力（审查时需意识的对立平衡）═══
tensions:
  - { pair: "示例: 简单 vs 完整", balance: "先简单跑通 vs 追求完整；平衡：够用即止，过度即废" }
  # - { pair: "...", balance: "..." }
