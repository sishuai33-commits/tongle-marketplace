# discard-patterns.yaml — 认脸主题级去重模式库（M2）
# 来源：cross-domain-extract 提取种子(dp-001~005) + 批阅真实候选写入(dp-006~010)
# human_confirmed: false 的不生效，人确认后改 true
# discard-pattern-check.py 用 confirmed 模式匹配候选，标 discard_pattern_hit
# 不自动 discard（守红线5人确认），只标记辅助人裁决策

